<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>NextGen Academy | AI Interface</title>
    <link rel="icon" href="data:,">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Manrope:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
          tailwind.config = {
            darkMode: "class",
            theme: {
              extend: {
                "colors": {
                        "secondary": "#63f3ba",
                        "primary": "#a2ffbf",
                        "surface-container-high": "#1b211e",
                        "background": "#0b0f0d"
                },
              },
            },
          }
    </script>
    <style>
        body { background-color: #0b0f0d; color: #f4f7f3; font-family: 'Manrope', sans-serif; overflow: hidden; }
        .neural-glow { box-shadow: 0px 0px 40px rgba(162, 255, 191, 0.1); }
        .ai-pulse { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 100%; height: 100%; background: radial-gradient(circle, rgba(162, 255, 191, 0.05) 0%, transparent 70%); z-index: -1; }
        
        /* Interactive States */
        .mic-active {
            background: linear-gradient(to bottom right, #ef4444, #b91c1c) !important;
            color: white !important;
            animation: pulse-red 1.5s infinite !important;
        }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); transform: scale(1); }
            70% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); transform: scale(1.05); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); transform: scale(1); }
        }
    </style>
</head>
<body class="bg-background min-h-screen flex flex-col items-center">

    <header class="flex justify-between items-center py-8 w-full max-w-7xl px-6 top-0 z-50">
        <h1 class="text-2xl font-bold text-[#a2ffbf] font-['Space_Grotesk'] tracking-tighter">NextGen Academy</h1>
        <button onclick="setApiKey()" class="text-[10px] text-secondary/40 hover:text-secondary border border-secondary/20 px-3 py-1 rounded-full transition-all uppercase tracking-widest">
            [ Connect Brain ]
        </button>
    </header>

    <main class="flex-grow w-full max-w-7xl px-6 pb-24 flex flex-col items-center justify-center relative">
        <div class="ai-pulse"></div>
        
        <div class="w-full h-[70vh] rounded-xl overflow-hidden bg-surface-container-high neural-glow relative group" id="media-content">
            <div class="absolute inset-0 bg-gradient-to-tr from-black/40 to-transparent pointer-events-none"></div>
            
            <div id="content-display" class="w-full h-full flex flex-col items-center justify-center p-8">
                <div class="text-center">
                    <h2 class="text-4xl font-headline text-secondary mb-4 italic">Neural Core Initialized</h2>
                    <p class="text-on-surface-variant opacity-60">Welcome, Researcher. Connect your brain and activate neural link.</p>
                </div>
            </div>

            <div class="absolute top-6 left-6 flex flex-col gap-2">
                <div class="flex items-center gap-3 bg-black/60 backdrop-blur-md px-4 py-2 rounded-full border border-white/10">
                    <span id="status-dot" class="w-2 h-2 rounded-full bg-secondary"></span>
                    <span id="status-text" class="font-['Space_Grotesk'] text-[10px] uppercase tracking-[0.2em] text-secondary">Awaiting Connection</span>
                </div>
            </div>
        </div>
    </main>

    <div class="fixed bottom-0 right-0 z-50 flex items-center justify-center">
        <button id="mic-btn" class="rounded-full w-20 h-20 mb-8 mr-8 flex items-center justify-center bg-gradient-to-br from-[#a2ffbf] to-[#63f3ba] text-[#006437] transition-all duration-300 group relative">
            <span class="material-symbols-outlined text-4xl">mic</span>
        </button>
    </div>

    <script>
        // Use LocalStorage so GitHub doesn't block the API Key
        let GROQ_API_KEY = localStorage.getItem('nextgen_key') || ""; 

        const micBtn = document.getElementById('mic-btn');
        const mediaContent = document.getElementById('content-display');
        const statusText = document.getElementById('status-text');
        const statusDot = document.getElementById('status-dot');

        let isLive = false;
        let synth = window.speechSynthesis;
        let recognition;

        if (GROQ_API_KEY) updateStatus("System Ready", "bg-secondary");

        function setApiKey() {
            const key = prompt("Paste your Groq API Key here (gsk_...):");
            if (key) {
                localStorage.setItem('nextgen_key', key.trim());
                GROQ_API_KEY = key.trim();
                updateStatus("System Ready", "bg-secondary");
                alert("Neural link established.");
            }
        }

        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = false;
            recognition.onresult = (event) => {
                const text = event.results[0][0].transcript;
                updateStatus("Thinking...", "animate-pulse bg-yellow-400");
                sendToBrain(text);
            };
            recognition.onend = () => { if (isLive && !synth.speaking) recognition.start(); };
        }

        function updateStatus(text, dotClass) {
            statusText.innerText = text;
            statusDot.className = `w-2 h-2 rounded-full ${dotClass}`;
        }

        micBtn.onclick = () => {
            if (!GROQ_API_KEY) {
                setApiKey();
                return;
            }
            if (!isLive) {
                isLive = true;
                micBtn.classList.add('mic-active');
                updateStatus("Listening...", "bg-red-500 animate-ping");
                if (synth.speaking) synth.cancel();
                recognition.start();
            } else {
                isLive = false;
                micBtn.classList.remove('mic-active');
                updateStatus("System Ready", "bg-secondary");
                recognition.stop();
                synth.cancel();
            }
        };

        async function sendToBrain(userText) {
            if (synth.speaking) synth.cancel();

            const sys = `You are Ken, a Science Tutor. Respond in the user's language (English, Hindi, Bengali). JSON: {"lang":"en-IN","text":"...","wiki":"term","img":"prompt"}`;

            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${GROQ_API_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant",
                        messages: [{role: "system", content: sys}, {role: "user", content: userText}],
                        response_format: { type: "json_object" }
                    })
                });

                if (!res.ok) throw new Error("Key Error");
                const data = await res.json();
                const ai = JSON.parse(data.choices[0].message.content);

                const wiki = await fetch(`https://en.wikipedia.org/w/api.php?action=query&list=allimages&aiprop=url&ailimit=1&aiformat=gif&aifrom=${encodeURIComponent(ai.wiki)}&origin=*&format=json`);
                const wData = await wiki.json();
                const gif = (wData.query?.allimages?.length > 0) ? wData.query.allimages[0].url : "";
                const img = `https://image.pollinations.ai/prompt/${encodeURIComponent(ai.img)}?width=1080&height=720&nologo=true`;

                mediaContent.innerHTML = `
                    <div class="flex flex-col md:flex-row gap-8 w-full h-full items-center p-4">
                        <img src="${img}" class="w-full md:w-1/2 max-h-full object-cover rounded-2xl border border-white/5 shadow-2xl">
                        <div class="w-full md:w-1/2 text-left">
                            <h3 class="text-secondary font-headline text-xs uppercase tracking-[0.3em] mb-4">Laboratory Output</h3>
                            <p class="text-white text-xl font-light leading-relaxed mb-6">${ai.text}</p>
                            ${gif ? `<img src="${gif}" class="w-24 h-24 rounded-lg border border-secondary/20 bg-black/40">` : ''}
                        </div>
                    </div>`;

                const speech = new SpeechSynthesisUtterance(ai.text);
                speech.lang = ai.lang;
                speech.onstart = () => updateStatus("Ken is Speaking", "bg-blue-400 animate-pulse");
                speech.onend = () => { if (isLive) recognition.start(); else updateStatus("System Ready", "bg-secondary"); };
                synth.speak(speech);

            } catch (err) {
                updateStatus("Check Connection", "bg-red-600");
                localStorage.removeItem('nextgen_key'); // Clear key if bad
            }
        }
    </script>
</body>
</html>
